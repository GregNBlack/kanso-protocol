<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles/tokens.css">
<link rel="stylesheet" href="./styles/dark.css">
<style>
  html, body {
    font-family: 'Onest', system-ui, sans-serif;
  }
  /* Paint body in the active theme's base surface so transparent-bg
     elements (badges, list rows, nav items) inherit a correct parent
     background when axe-core computes contrast. Without this, body
     stays browser-default white in dark mode and axe reports false
     "light text on white" contrast failures for any element that
     doesn't paint its own opaque background. */
  body {
    background-color: var(--kp-color-surface-base);
  }

  /* Storybook autodocs preview blocks (`<Canvas>` wrappers) ship with a
     hardcoded light background from @storybook/blocks. When the theme
     toggle flips to dark, follow through with a dark surface so the
     preview canvas matches the rest of the rendered story instead of
     leaving a white island under the components. */
  [data-theme="dark"] .sbdocs.sbdocs-preview,
  [data-theme="dark"] .sbdocs-preview {
    background-color: var(--kp-color-surface-base);
    border-color: var(--kp-color-border-default);
  }
  [data-theme="dark"] .sbdocs.sbdocs-content {
    background-color: transparent;
    color: var(--kp-color-text-default);
  }
  /* Code blocks ship with a light background too — same treatment. */
  [data-theme="dark"] .sbdocs.sbdocs-pre,
  [data-theme="dark"] .docblock-source {
    background-color: var(--kp-color-surface-subtle);
    border-color: var(--kp-color-border-default);
    color: var(--kp-color-text-default);
  }
  /* Args / props tables. */
  [data-theme="dark"] .docblock-argstable,
  [data-theme="dark"] .docblock-argstable-head,
  [data-theme="dark"] .docblock-argstable-body {
    background-color: var(--kp-color-surface-base);
    color: var(--kp-color-text-default);
  }
  [data-theme="dark"] .docblock-argstable th,
  [data-theme="dark"] .docblock-argstable td {
    border-color: var(--kp-color-border-subtle);
  }
</style>

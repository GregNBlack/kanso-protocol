name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changelog:
    # Enforces that any PR which bumps a `packages/**/package.json` version
    # also updates CHANGELOG.md. The check parses the diff against the PR
    # base ref — see scripts/check-changelog.js for the full ruleset and
    # the [skip-changelog] override.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md is updated when a package version is bumped
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-changelog.js

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Lint tokens (architectural rules)
        run: npm run lint:tokens
      - name: Build tokens
        run: npm run build:tokens
      - name: Build libraries
        run: npm run build:libs
      - name: Bundle-size budget gate
        # Per-package gzipped fesm2022 size check against bundle-budget.json.
        # Fails on regressions over the recorded headroom; if growth is
        # intentional, run `npm run check:bundle-size:update` locally and
        # commit the refreshed budget in the same PR. See scripts/check-bundle-size.js.
        run: npm run check:bundle-size
      - name: Build MCP server
        run: npm run build:mcp
      - name: Build Storybook
        # KANSO_HIDE_AUDIT=1 drops the internal Foundations / Dark Theme Audit
        # page from CI builds — same flag used by deploy-storybook.yml so all
        # CI artifacts (a11y, visual-regression, deployed gh-pages) stay
        # consistent.
        env:
          KANSO_HIDE_AUDIT: '1'
        run: npm run build-storybook
      - name: Unit tests (Vitest)
        id: vitest
        run: npm test 2>&1 | tee /tmp/vitest-output.log
      - name: Upload Vitest output on failure
        if: failure() && steps.vitest.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output
          path: /tmp/vitest-output.log
          retention-days: 7
          if-no-files-found: ignore

  a11y:
    # Serve the built Storybook, then run `test-storybook` against it — the
    # test-runner config in `.storybook/test-runner.ts` runs axe-core in BOTH
    # light and dark themes for every story, so any dark-mode regression
    # (hardcoded colors, missed tokens, contrast drops) shows up as a serious
    # axe violation here.
    #
    # Hard gate on `critical` axe-core violations only (set in
    # .storybook/test-runner.ts via `includedImpacts: ['critical']`).
    # `serious` + `moderate` still surface in the detailed report (visible
    # in this job's logs) but they're advisory — the residual long-tail
    # after phase-2 cleanup is mostly known edge cases (rgba composition
    # through Angular view-encapsulation, contain:strict viewport, etc.)
    # that aren't worth blocking every PR over.
    name: a11y + dark-mode
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build tokens
        run: npm run build:tokens
      - name: Build Storybook
        # KANSO_HIDE_AUDIT=1 drops the internal Foundations / Dark Theme Audit
        # page from CI builds — same flag used by deploy-storybook.yml so all
        # CI artifacts (a11y, visual-regression, deployed gh-pages) stay
        # consistent.
        env:
          KANSO_HIDE_AUDIT: '1'
        run: npm run build-storybook
      - name: Serve Storybook & run a11y + dark-mode checks
        # KANSO_HIDE_AUDIT must be set on the TEST step too — test-storybook
        # re-evaluates .storybook/main.ts to discover stories, so without the
        # env var here it lists the audit stories that don't exist in the
        # built/served static bundle, producing "story missing" errors.
        env:
          KANSO_HIDE_AUDIT: '1'
        run: |
          npx concurrently -k -s first -n "SB,TEST" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:storybook -- --url http://localhost:6006"

  visual-regression:
    # Pixel-level visual regression against committed baselines in
    # e2e/visual.spec.ts-snapshots/. Curated set of representative stories
    # (see e2e/visual.spec.ts), both light + dark. **Hard gate** — any diff
    # above maxDiffPixelRatio (1%) fails the build.
    #
    # On intentional visual changes: include `[update-baselines]` in the
    # commit message — this run will regenerate the snapshots in CI, commit
    # them as a follow-up `chore(visual): refresh baselines [skip-release]`,
    # and the next CI run on that follow-up will be green. Linux baselines
    # have to come from a Linux runner, so this beats the "generate locally
    # on macOS, fail in CI" loop.
    name: visual-regression
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Build tokens + Storybook
        env:
          KANSO_HIDE_AUDIT: '1'
        run: npm run build:tokens && npm run build-storybook
      - name: Detect baseline-refresh mode
        id: mode
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q "\[update-baselines\]"; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Serve Storybook & run visual diffs
        if: steps.mode.outputs.update == 'false'
        env:
          STORYBOOK_URL: http://localhost:6006
        run: |
          npx concurrently -k -s first -n "SB,VISUAL" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:visual"
      - name: Serve Storybook & regenerate baselines
        if: steps.mode.outputs.update == 'true'
        env:
          STORYBOOK_URL: http://localhost:6006
        run: |
          npx concurrently -k -s first -n "SB,VISUAL" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:visual:update"
      - name: Commit refreshed baselines
        if: steps.mode.outputs.update == 'true'
        # Author as the repo owner so the commit doesn't surface
        # `github-actions[bot]` in the Contributors sidebar — the email
        # has to be the one tied to your GitHub account so attribution
        # maps back to it.
        #
        # Push retries up to 3 times with rebase to survive the race where
        # another commit lands on `main` while the snapshot regeneration
        # was running. Without the retry the push gets rejected as
        # non-fast-forward and the new baselines silently never land.
        run: |
          git config user.name "Greg N Black"
          git config user.email "orekhovgn@gmail.com"
          git add e2e/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline diffs — nothing to commit."
            exit 0
          fi
          git commit -m "chore(visual): refresh baselines [skip-release]"
          for attempt in 1 2 3; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; rebasing on latest origin and retrying"
            git fetch origin ${{ github.ref_name }}
            git rebase origin/${{ github.ref_name }} || { git rebase --abort; exit 1; }
          done
          echo "::error::Failed to push baseline refresh after 3 attempts"
          exit 1
      - name: Upload baselines / diffs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: |
            e2e/visual.spec.ts-snapshots/
            e2e/test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore

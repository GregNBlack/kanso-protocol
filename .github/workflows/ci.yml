name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build tokens
        run: npm run build:tokens
      - name: Build libraries
        run: npm run build:libs
      - name: Build Storybook
        run: npm run build-storybook

  a11y:
    # Serve the built Storybook, then run `test-storybook` against it — the
    # test-runner config in `.storybook/test-runner.ts` runs axe-core and
    # surfaces moderate+ violations.
    #
    # Currently advisory (continue-on-error) so existing stories that haven't
    # been audited yet don't block merges. Flip to a hard gate once the
    # baseline is clean by removing `continue-on-error`.
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build tokens
        run: npm run build:tokens
      - name: Build Storybook
        run: npm run build-storybook
      - name: Serve Storybook & run a11y tests
        run: |
          npx concurrently -k -s first -n "SB,TEST" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:storybook -- --url http://localhost:6006"

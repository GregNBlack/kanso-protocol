name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changelog:
    # Enforces that any PR which bumps a `packages/**/package.json` version
    # also updates CHANGELOG.md. The check parses the diff against the PR
    # base ref — see scripts/check-changelog.js for the full ruleset and
    # the [skip-changelog] override.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md is updated when a package version is bumped
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-changelog.js

  guards:
    # Fast, dependency-free invariants (no npm ci). Fail early on the two
    # classes of regression the v5 migration exposed:
    #   - stale pre-v5 package/path references creeping back into source
    #   - a package-lock.json whose workspace set drifted from disk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: No stale pre-v5 package/path references
        run: node scripts/check-no-stale-refs.js
      - name: Lockfile workspaces in sync with disk
        run: node scripts/check-lockfile-workspaces.js
      - name: Token integrity (matrix completeness + ramp-step + dark existence)
        # Enforces the state matrix has no holes, that the mechanical
        # rest→hover→active ramp step holds, and every dark override maps to a
        # real light token. Makes the "no exception without a record" contract
        # machine-checked instead of declared. See scripts/validate-tokens.js.
        run: node scripts/validate-tokens.js
      - name: Stability facts in sync (README + stability.md ↔ stability.json)
        # docs/stability.json is the machine-readable tier source; this fails
        # if README's status block or stability.md's summary counts drift from
        # it. Kills the README-vs-stability contradiction class of bug.
        run: node scripts/generate-stability.js --check
      - name: Coverage gate (docs + spec exist for every stable surface)
        # Turns two declared-but-unenforced stability.md rubric criteria into a
        # gate: every component/pattern has a contract doc, and every `stable`
        # non-exempt surface (pure-layout/presentational excepted) has a unit
        # spec. See scripts/check-coverage.js.
        run: node scripts/check-coverage.js

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Lint tokens (architectural rules)
        run: npm run lint:tokens
      - name: Build tokens
        run: npm run build:tokens
      - name: Contrast gate (WCAG AA, light + dark)
        # Resolves the built --kp-color-* var() chains and computes real WCAG
        # contrast for the curated fg/bg pairs in scripts/contrast-pairs.json,
        # in BOTH themes. Fails below the required ratio — so an AA regression
        # in a token pair can no longer ship on an unverified hand-comment.
        run: npm run check:contrast
      - name: Build libraries
        run: npm run build:libs
      - name: Bundle-size budget gate
        # Per-package gzipped fesm2022 size check against bundle-budget.json.
        # Fails on regressions over the recorded headroom; if growth is
        # intentional, run `npm run check:bundle-size:update` locally and
        # commit the refreshed budget in the same PR. See scripts/check-bundle-size.js.
        run: npm run check:bundle-size
      - name: Build MCP server
        run: npm run build:mcp
      - name: MCP manifest is fresh (no drift)
        # Regenerates packages/mcp/manifest.json and fails if it differs from
        # the committed copy — blocks merging a stale catalog (e.g. a new
        # component that was never re-catalogued, as happened with
        # table-virtual). The generator is deterministic (stable generatedAt),
        # so this only fires on genuine catalog drift, not timestamp churn.
        run: |
          node scripts/generate-mcp-manifest.js
          git diff --exit-code packages/mcp/manifest.json
      - name: Build Storybook
        # KANSO_HIDE_AUDIT=1 drops the internal Foundations / Dark Theme Audit
        # page from CI builds — same flag used by deploy-storybook.yml so all
        # CI artifacts (a11y, visual-regression, deployed gh-pages) stay
        # consistent.
        env:
          KANSO_HIDE_AUDIT: '1'
        run: npm run build-storybook
      - name: Unit tests (Vitest)
        id: vitest
        run: npm test 2>&1 | tee /tmp/vitest-output.log
      - name: Upload Vitest output on failure
        if: failure() && steps.vitest.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output
          path: /tmp/vitest-output.log
          retention-days: 7
          if-no-files-found: ignore

  a11y:
    # Serve the built Storybook, then run `test-storybook` against it — the
    # test-runner config in `.storybook/test-runner.ts` runs axe-core in BOTH
    # light and dark themes for every story, so any dark-mode regression
    # (hardcoded colors, missed tokens, contrast drops) shows up as a serious
    # axe violation here.
    #
    # Hard gate on `critical` axe-core violations only (set in
    # .storybook/test-runner.ts via `includedImpacts: ['critical']`).
    # `serious` + `moderate` still surface in the detailed report (visible
    # in this job's logs) but they're advisory — the residual long-tail
    # after phase-2 cleanup is mostly known edge cases (rgba composition
    # through Angular view-encapsulation, contain:strict viewport, etc.)
    # that aren't worth blocking every PR over.
    name: a11y + dark-mode
    runs-on: ubuntu-latest
    needs: build
    # Run inside the official Playwright image — Chromium + all system
    # deps are baked in, so there's no `playwright install` step (the
    # ~170MB CDN download intermittently stalled for the full 6h job
    # limit). Image tag MUST match the @playwright/test version.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build tokens
        run: npm run build:tokens
      - name: Build Storybook
        # KANSO_HIDE_AUDIT=1 drops the internal Foundations / Dark Theme Audit
        # page from CI builds — same flag used by deploy-storybook.yml so all
        # CI artifacts (a11y, visual-regression, deployed gh-pages) stay
        # consistent.
        env:
          KANSO_HIDE_AUDIT: '1'
        run: npm run build-storybook
      - name: Serve Storybook & run a11y + dark-mode checks
        # KANSO_HIDE_AUDIT must be set on the TEST step too — test-storybook
        # re-evaluates .storybook/main.ts to discover stories, so without the
        # env var here it lists the audit stories that don't exist in the
        # built/served static bundle, producing "story missing" errors.
        env:
          KANSO_HIDE_AUDIT: '1'
          # reduced-motion.spec (Playwright) reads STORYBOOK_URL for its baseURL.
          STORYBOOK_URL: http://localhost:6006
        run: |
          npx concurrently -k -s first -n "SB,TEST" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:storybook -- --url http://localhost:6006 && npm run test:reduced-motion"

  visual-regression:
    # Pixel-level visual regression against committed baselines in
    # e2e/visual.spec.ts-snapshots/. Curated set of representative stories
    # (see e2e/visual.spec.ts), both light + dark. **Hard gate** — any diff
    # above maxDiffPixelRatio (1%) fails the build.
    #
    # On intentional visual changes: include `[update-baselines]` in the
    # commit message — this run will regenerate the snapshots in CI, commit
    # them as a follow-up `chore(visual): refresh baselines [skip-release]`,
    # and the next CI run on that follow-up will be green. Linux baselines
    # have to come from a Linux runner, so this beats the "generate locally
    # on macOS, fail in CI" loop.
    name: visual-regression
    runs-on: ubuntu-latest
    needs: build
    # Official Playwright image — browsers + deps baked in, no install
    # step. Tag MUST match the @playwright/test version.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build tokens + Storybook
        env:
          KANSO_HIDE_AUDIT: '1'
        run: npm run build:tokens && npm run build-storybook
      - name: Detect baseline-refresh mode
        id: mode
        # Use a GitHub expression (not a shell echo of the commit message):
        # contains() evaluates to the literal `true`/`false`, so the message
        # never reaches the shell. Echoing it directly broke `sh -e` whenever
        # the message held backticks / quotes / newlines (shell injection).
        run: echo "update=${{ contains(github.event.head_commit.message, '[update-baselines]') }}" >> "$GITHUB_OUTPUT"
      - name: Serve Storybook & run visual diffs
        if: steps.mode.outputs.update == 'false'
        env:
          STORYBOOK_URL: http://localhost:6006
        run: |
          npx concurrently -k -s first -n "SB,VISUAL" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:visual"
      - name: Serve Storybook & regenerate baselines
        if: steps.mode.outputs.update == 'true'
        env:
          STORYBOOK_URL: http://localhost:6006
        run: |
          npx concurrently -k -s first -n "SB,VISUAL" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:visual:update"
      - name: Commit refreshed baselines
        if: steps.mode.outputs.update == 'true'
        # Author as the repo owner so the commit doesn't surface
        # `github-actions[bot]` in the Contributors sidebar — the email
        # has to be the one tied to your GitHub account so attribution
        # maps back to it.
        #
        # Push retries up to 3 times with rebase to survive the race where
        # another commit lands on `main` while the snapshot regeneration
        # was running. Without the retry the push gets rejected as
        # non-fast-forward and the new baselines silently never land.
        run: |
          # Inside the Playwright container the workspace is owned by a
          # different uid than the git process runs as → mark it safe so
          # git doesn't bail with "detected dubious ownership".
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "Greg N Black"
          git config user.email "orekhovgn@gmail.com"
          git add e2e/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline diffs — nothing to commit."
            exit 0
          fi
          git commit -m "chore(visual): refresh baselines [skip-release]"
          for attempt in 1 2 3; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; rebasing on latest origin and retrying"
            git fetch origin ${{ github.ref_name }}
            git rebase origin/${{ github.ref_name }} || { git rebase --abort; exit 1; }
          done
          echo "::error::Failed to push baseline refresh after 3 attempts"
          exit 1
      - name: Upload baselines / diffs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: |
            e2e/visual.spec.ts-snapshots/
            e2e/test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  web-components:
    name: web-components (custom elements)
    runs-on: ubuntu-latest
    needs: build
    # Playwright image (Chromium baked in) — the smoke loads the elements
    # bundle on a blank page and asserts components upgrade + render.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build tokens + libs
        run: npm run build:tokens && npm run build:libs
      - name: Build custom-elements bundle
        run: npm run build:elements
      - name: Bundle-size budget gate (incl. elements bundle)
        # build:libs + build:elements both ran in this job, so this measures
        # the ui fesm2022 entry points AND the framework-agnostic elements
        # bundle (keyed `elements` in bundle-budget.json). Gates the 1.9 MB
        # elements distribution that the ui-only `build` job can't see.
        run: npm run check:bundle-size
      - name: Smoke — elements upgrade + render
        run: npm run test:elements

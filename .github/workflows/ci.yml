name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changelog:
    # Enforces that any PR which bumps a `packages/**/package.json` version
    # also updates CHANGELOG.md. The check parses the diff against the PR
    # base ref — see scripts/check-changelog.js for the full ruleset and
    # the [skip-changelog] override.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md is updated when a package version is bumped
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-changelog.js

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Lint tokens (architectural rules)
        run: npm run lint:tokens
      - name: Build tokens
        run: npm run build:tokens
      - name: Build libraries
        run: npm run build:libs
      - name: Build MCP server
        run: npm run build:mcp
      - name: Build Storybook
        run: npm run build-storybook
      - name: Unit tests (Vitest)
        run: npm test

  a11y:
    # Serve the built Storybook, then run `test-storybook` against it — the
    # test-runner config in `.storybook/test-runner.ts` runs axe-core in BOTH
    # light and dark themes for every story, so any dark-mode regression
    # (hardcoded colors, missed tokens, contrast drops) shows up as a serious
    # axe violation here.
    #
    # Currently advisory (continue-on-error) so existing stories that haven't
    # been audited yet don't block merges. Flip to a hard gate once the
    # baseline is clean by removing `continue-on-error`.
    name: a11y + dark-mode
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build tokens
        run: npm run build:tokens
      - name: Build Storybook
        run: npm run build-storybook
      - name: Serve Storybook & run a11y + dark-mode checks
        run: |
          npx concurrently -k -s first -n "SB,TEST" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:storybook -- --url http://localhost:6006"

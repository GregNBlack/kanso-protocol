name: Deploy Storybook
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
# GitHub Pages only accepts one deployment at a time per environment.
# Without this block, back-to-back pushes queue parallel workflow runs
# that race for the same slot and fail each other.
# cancel-in-progress: false — let each run finish cleanly (Pages'
# recommended pattern; cancelling mid-deploy leaves the environment
# stuck on the cancelled run and fails the next one).
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build tokens
        run: npm run build:tokens
      - name: Build Storybook
        run: npx ng run kanso-protocol:build-storybook
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static
      - id: deployment
        uses: actions/deploy-pages@v4

name: Release

# Changeset-driven release pipeline.
#
# Gated: the "Create release PR or publish" step only runs when the repo
# has an `NPM_TOKEN` secret configured. Until that's set up, the job still
# runs `build:libs` on every push to `main` to validate the build, but
# doesn't try to version/publish — keeping the workflow green.
#
# 1. Contributor adds `npx changeset` to their PR describing the change kind
#    (patch / minor / major). Changeset markdown files live in `.changeset/`.
# 2. When their PR merges to `main`, this workflow runs:
#      - If pending changesets exist → opens / updates a "Version Packages"
#        PR that bumps every affected package.json and writes CHANGELOG.
#      - If a "Version Packages" PR is merged (no pending changesets) →
#        builds libraries and publishes the changed ones to npm.
# 3. Requires two repo secrets:
#      NPM_TOKEN     — an npm token with publish rights on @kanso-protocol/*
#      GITHUB_TOKEN  — auto-provided by GitHub Actions (used by the action)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build tokens
        run: npm run build:tokens

      - name: Build libraries
        run: npm run build:libs

      - name: Create release PR or publish
        if: env.HAS_NPM_TOKEN == 'true'
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: node scripts/publish-libs.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release gate skipped (no NPM_TOKEN)
        if: env.HAS_NPM_TOKEN != 'true'
        run: |
          echo "::notice::NPM_TOKEN not configured — release step skipped."
          echo "Add NPM_TOKEN in repo settings → Secrets → Actions to enable publishing."

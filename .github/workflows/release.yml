name: Release

# Changeset-driven release pipeline.
#
# Two-phase:
#   1. Pending changesets → `changesets/action` opens / updates a
#      "Version Packages" PR (bumps every affected package.json and writes
#      the CHANGELOG). No npm publish in this phase — no NPM_TOKEN needed.
#   2. Version PR merged → the action runs `publish:` which walks
#      `dist/packages/**` and `npm publish`es each unpublished one. This
#      phase needs NPM_TOKEN; without it, the publish script exits 0 with
#      a notice so the workflow stays green.
#
# Secrets used:
#   NPM_TOKEN     — npm automation token with publish rights on
#                   @kanso-protocol/*. Optional: the Version PR still
#                   works without it, you just can't actually ship.
#   GITHUB_TOKEN  — auto-provided by GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build tokens
        run: npm run build:tokens

      - name: Build libraries
        run: npm run build:libs

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: node scripts/publish-libs.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node writes .npmrc with `${NODE_AUTH_TOKEN}` placeholder;
          # npm resolves it at runtime. Our publish-libs.js reads NPM_TOKEN
          # for the graceful-skip check, but npm itself needs NODE_AUTH_TOKEN.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
